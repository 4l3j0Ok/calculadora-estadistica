name: Release

# semantic-release analiza los commits de `main` (Conventional Commits),
# decide la próxima versión, genera el CHANGELOG, crea el tag y publica
# el GitHub Release. Si hubo una nueva release, ejecuta los builds de
# Windows y Linux y adjunta sus artefactos.

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-22.04

    # Evita volver a ejecutar semantic-release sobre el commit generado
    # por @semantic-release/git.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')

    outputs:
      released: ${{ steps.detect.outputs.released }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install release tooling
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: Detectar si se publicó una release
        id: detect
        shell: bash
        run: |
          if version="$(git describe --tags --exact-match HEAD 2>/dev/null)"; then
            echo "==> Nueva release: ${version}"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          else
            echo "==> No hubo cambios que ameriten una nueva release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    name: Build Windows (release)
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-windows.yml
    with:
      app_version: ${{ needs.release.outputs.version }}

  build-linux:
    name: Build Linux (release)
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-linux.yml
    with:
      app_version: ${{ needs.release.outputs.version }}
