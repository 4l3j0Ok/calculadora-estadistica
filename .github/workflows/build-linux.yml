name: Build Linux

on:
  workflow_dispatch: {}
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build standalone (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (Nuitka + PySide6/Qt runtime deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            patchelf \
            ccache \
            libgl1 \
            libegl1 \
            libopengl0 \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libfontconfig1 \
            libdbus-1-3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install project dependencies (incl. dev group)
        run: uv sync --group dev

      - name: Run build script
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Locate release artifact
        id: artifact
        run: |
          archive="$(ls dist/releases/*.tar.gz | head -n1)"
          if [[ -z "${archive}" ]]; then
            echo "No se encontro ningun .tar.gz en dist/releases" >&2
            exit 1
          fi
          echo "path=${archive}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${archive}")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraEstadistica-Linux-x86_64
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Attach asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
