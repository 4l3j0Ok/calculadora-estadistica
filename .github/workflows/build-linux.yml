name: Build Linux

on:
  workflow_dispatch: {}
  workflow_call:
    inputs:
      app_version:
        description: >-
          Version a compilar y, si se informa, tag del GitHub Release al
          que se le adjunta el artefacto.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build standalone (Linux x86_64)
    runs-on: ubuntu-22.04

    env:
      CCACHE_DIR: ~/.cache/ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPRESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            patchelf \
            ccache \
            libgl1 \
            libegl1 \
            libopengl0 \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-util1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libfontconfig1 \
            libdbus-1-3 \
            xvfb

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ runner.os }}-gcc11-python314-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-linux-${{ runner.os }}-gcc11-python314-${{ github.ref_name }}-
            ccache-linux-${{ runner.os }}-gcc11-python314-

      - name: Configure ccache
        run: |
          ccache --zero-stats
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install project dependencies
        run: uv sync --group dev --frozen

      - name: Run unit/integration tests
        run: uv run pytest

      - name: Run build script
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Show ccache statistics
        if: always()
        run: ccache --show-stats

      - name: Locate release artifacts
        id: artifact
        shell: bash
        run: |
          shopt -s nullglob

          archives=(dist/releases/*.tar.gz)
          appimages=(dist/releases/*.AppImage)

          if (( ${#archives[@]} == 0 )); then
            echo "No se encontró ningún .tar.gz en dist/releases" >&2
            exit 1
          fi

          if (( ${#appimages[@]} == 0 )); then
            echo "No se encontró ningún .AppImage en dist/releases" >&2
            exit 1
          fi

          archive="${archives[0]}"
          appimage="${appimages[0]}"
          zsync="${appimage}.zsync"

          if [[ ! -f "${zsync}" ]]; then
            echo "No se encontró ${zsync}" >&2
            exit 1
          fi

          echo "path=${archive}" >> "$GITHUB_OUTPUT"
          echo "appimage_path=${appimage}" >> "$GITHUB_OUTPUT"
          echo "zsync_path=${zsync}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraEstadistica-Linux-x86_64
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraEstadistica-Linux-x86_64-AppImage
          path: |
            ${{ steps.artifact.outputs.appimage_path }}
            ${{ steps.artifact.outputs.zsync_path }}
          if-no-files-found: error

      - name: Attach assets to GitHub Release
        if: inputs.app_version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.app_version }}
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.appimage_path }}
            ${{ steps.artifact.outputs.zsync_path }}
          fail_on_unmatched_files: true
