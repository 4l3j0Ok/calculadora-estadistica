name: Build Linux

on:
  workflow_dispatch: {}
  workflow_call:
    inputs:
      app_version:
        description: >-
          Version a compilar y, si se informa, tag del GitHub Release al
          que se le adjunta el artefacto (la crea/gestiona
          release.yml via semantic-release). Si se omite (build manual
          via workflow_dispatch), no se adjunta a ningun release y
          scripts/build-linux.sh resuelve la version por su cuenta
          (APP_VERSION > pyproject.toml > fallback).
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build standalone (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (Nuitka + PySide6/Qt runtime deps + AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            patchelf \
            ccache \
            libgl1 \
            libegl1 \
            libopengl0 \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-util1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libfontconfig1 \
            libdbus-1-3 \
            xvfb

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install project dependencies (incl. dev group)
        run: uv sync --group dev

      - name: Run build script
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Locate release artifacts
        id: artifact
        run: |
          archive="$(ls dist/releases/*.tar.gz | head -n1)"
          if [[ -z "${archive}" ]]; then
            echo "No se encontro ningun .tar.gz en dist/releases" >&2
            exit 1
          fi
          appimage="$(ls dist/releases/*.AppImage | head -n1)"
          if [[ -z "${appimage}" ]]; then
            echo "No se encontro ningun .AppImage en dist/releases" >&2
            exit 1
          fi
          zsync="${appimage}.zsync"
          if [[ ! -f "${zsync}" ]]; then
            echo "No se encontro ${zsync}" >&2
            exit 1
          fi
          echo "path=${archive}" >> "$GITHUB_OUTPUT"
          echo "appimage_path=${appimage}" >> "$GITHUB_OUTPUT"
          echo "zsync_path=${zsync}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraEstadistica-Linux-x86_64
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraEstadistica-Linux-x86_64-AppImage
          path: |
            ${{ steps.artifact.outputs.appimage_path }}
            ${{ steps.artifact.outputs.zsync_path }}
          if-no-files-found: error

      - name: Attach assets to GitHub Release
        if: inputs.app_version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.app_version }}
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.appimage_path }}
            ${{ steps.artifact.outputs.zsync_path }}
          fail_on_unmatched_files: true
