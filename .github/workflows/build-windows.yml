name: Build Windows

on:
  workflow_dispatch: {}
  workflow_call:
    inputs:
      app_version:
        description: >-
          Version a compilar y, si se informa, tag del GitHub Release al
          que se le adjunta el artefacto (la crea/gestiona
          release.yml via semantic-release). Si se omite (build manual
          via workflow_dispatch), no se adjunta a ningun release y
          scripts/build-windows.ps1 resuelve la version por su cuenta
          (APP_VERSION > pyproject.toml > fallback).
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build standalone (Windows x86_64)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install project dependencies (incl. dev group)
        run: uv sync --group dev

      - name: Run unit/integration tests
        run: uv run pytest

      - name: Run build script
        shell: pwsh
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: ./scripts/build-windows.ps1

      - name: Locate release artifact
        id: artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "dist/releases" -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Error "No se encontro ningun ZIP en dist/releases"
            exit 1
          }
          "path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraEstadistica-Windows-x86_64
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Attach asset to GitHub Release
        if: inputs.app_version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.app_version }}
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
