name: Build Windows

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build standalone (Windows x86_64)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install project dependencies (incl. dev group)
        run: uv sync --group dev

      - name: Run build script
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Locate release artifact
        id: artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "dist/releases" -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Error "No se encontro ningun ZIP en dist/releases"
            exit 1
          }
          "path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraEstadistica-Windows-x86_64
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Attach asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
